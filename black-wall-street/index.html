<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1" />
    <title>Black Wall Street of Roxbury</title>

    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.29/esri/themes/dark/main.css"
    />
    <link rel="icon" type="image/png+xml" href="../logo.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://js.arcgis.com/4.29/"></script>
  </head>

  <body>
    <div id="app">
      <!-- #story is populated by md-parser.js from content.md -->
      <div id="story">
        <div id="hero"></div>
      </div>
      <div id="viewDiv"></div>
    </div>

    <!--
      Load order matters:
        1. md-parser.js  – fetches content.md, parses it, injects HTML into #story
        2. app.js        – runs after DOMContentLoaded; md-parser fires a
                           "contentReady" event that app.js waits for
    -->
    <script src="md-parser.js"></script>
    <script src="app.js"></script>
  </body>
</html>
